name: Deploy RecipeAtlas

on:
  push:
    branches: [master-github]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure Pages is enabled
        if: env.PAGES_ENABLEMENT_TOKEN == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh api "repos/${{ github.repository }}/pages" > /dev/null 2>&1; then
            echo "::error::GitHub Pages is not enabled for this repository. Go to Settings > Pages and set Source to GitHub Actions, or add a PAGES_ENABLEMENT_TOKEN secret with Pages/admin permission so this workflow can enable it automatically."
            exit 1
          fi

      - name: Enable Pages
        if: env.PAGES_ENABLEMENT_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.PAGES_ENABLEMENT_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" > /dev/null 2>&1; then
            gh api --method PUT "repos/${{ github.repository }}/pages" -f build_type=workflow
          else
            gh api --method POST "repos/${{ github.repository }}/pages" -f build_type=workflow
          fi

      - name: Build
        shell: bash
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            BASE_PATH="/" SITE_URL="https://${{ github.repository_owner }}.github.io" npm run build
          else
            BASE_PATH="/${{ github.event.repository.name }}/" SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" npm run build
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
