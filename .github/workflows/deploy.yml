name: Deploy RecipeAtlas

on:
  push:
    branches: [master-github]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        shell: bash
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            BASE_PATH="/" SITE_URL="https://${{ github.repository_owner }}.github.io" npm run build
          else
            BASE_PATH="/${{ github.event.repository.name }}/" SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" npm run build
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
