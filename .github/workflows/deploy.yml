name: Deploy RecipeAtlas

on:
  push:
    branches: [master-github]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  prepare-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub Pages is enabled
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "GitHub Pages is already enabled."
            exit 0
          fi

          if [ -z "${PAGES_ENABLEMENT_TOKEN}" ]; then
            echo "::error::GitHub Pages is not enabled. Go to Settings > Pages and set Source to GitHub Actions, or add a PAGES_ENABLEMENT_TOKEN secret with Pages write and Administration write permission so this workflow can enable it automatically."
            exit 1
          fi

          echo "GitHub Pages is not enabled. Enabling it for GitHub Actions deployments."
          GH_TOKEN="${PAGES_ENABLEMENT_TOKEN}" gh api --method POST "repos/${{ github.repository }}/pages" -f build_type=workflow >/dev/null

  build:
    runs-on: ubuntu-latest
    needs: prepare-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        shell: bash
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            BASE_PATH="/" SITE_URL="https://${{ github.repository_owner }}.github.io" npm run build
          else
            BASE_PATH="/${{ github.event.repository.name }}/" SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" npm run build
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
